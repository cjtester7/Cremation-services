# netlify.toml — v21
# Updated for CR014: index-v21.html + booking-capture-v1.js

[[redirects]]
  from = "/"
  to = "/index-v21.html"
  status = 200

[[redirects]]
  from = "/voice-test"
  to = "/voice-test-v1.html"
  status = 200

[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
