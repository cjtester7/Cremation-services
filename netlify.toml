# netlify.toml — v25
# Updated for CR016 revision: index-v25.html

[[redirects]]
  from = "/"
  to = "/index-v25.html"
  status = 200

[[redirects]]
  from = "/voice-test"
  to = "/voice-test-v1.html"
  status = 200

[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
