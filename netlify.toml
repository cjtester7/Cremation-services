# netlify.toml — v20
# Updated for CR013: index-v20.html + send-email-v2.js

[[redirects]]
  from = "/"
  to = "/index-v20.html"
  status = 200

[[redirects]]
  from = "/voice-test"
  to = "/voice-test-v1.html"
  status = 200

[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
